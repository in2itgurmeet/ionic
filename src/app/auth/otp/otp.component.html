<ion-page>
  <ion-col [fullscreen]="true">

    <div class="container-fluid custom-scrollbar">
      <div class="row">

        <div class="mt-2 ms-2">
          <a routerLink="/auth/forgetPassword">
            <img src="assets/icon/back_button.png" height="30px" />
          </a>
        </div>

        <!-- Image -->
        <div class="text-center">
          <img src="assets/icon/otp_image.webp" class="mt-3 mb-3" style="width: 340px; height: 250px" />
        </div>

        <!-- Form -->
        <div class="ion-padding form_content">

          <div class="d-flex justify-content-center">
            <hr class="w-25" />
          </div>

          <div class="Header_informer text-center">
            <h2>ENTER OTP</h2>
            <p>OTP has been sent to +91 9999999999</p>
          </div>

          <form class="mt-3 mb-5">

            <ion-label>Enter your OTP</ion-label>

            <!-- OTP Inputs -->
            <div class="Input_optSection d-flex justify-content-between mt-2">

              <ion-input maxlength="1" class="form_input border text-center"></ion-input>
              <ion-input maxlength="1" class="form_input border text-center"></ion-input>
              <ion-input maxlength="1" class="form_input border text-center"></ion-input>
              <ion-input maxlength="1" class="form_input border text-center"></ion-input>
              <ion-input maxlength="1" class="form_input border text-center"></ion-input>
              <ion-input maxlength="1" class="form_input border text-center"></ion-input>

            </div>

            <!-- Timer / Resend -->
            <div class="text-center mt-3">
              <p *ngIf="showTimer">
                {{ minutes }}:{{ seconds | number:'2.0-0' }}
              </p>

              <p *ngIf="!showTimer" class="resend_text">
                Resend Your OTP
              </p>
            </div>

            <ion-button expand="block" class="mt-4" [routerLink]="['/auth/resetpassword']">
              Submit OTP
            </ion-button>

          </form>

        </div>
      </div>
      <!-- Back Button -->

    </div>

  </ion-col>
</ion-page>
