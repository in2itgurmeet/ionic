<ion-page>
  <ion-col [fullscreen]="true">

    <div class="container-fluid custom-scrollbar">
      <div class="row">

        <div class="mt-2 ms-2">
          <a [routerLink]="['/auth']">
            <img src="assets/icon/back_button.png" height="30px" />
          </a>
        </div>
        <div class="text-center">
          <img src="assets/icon/forget_password.png" class="mt-3 mb-3" style="width: 350px; height: 250px" />
        </div>
        <div class="ion-padding form_content">

          <div class="d-flex justify-content-center">
            <hr class="w-25" />
          </div>

          <div class="Header_informer text-center">
            <h2>FORGET PASSWORD</h2>
            <p>Enter email or mobile to get reset OTP</p>
          </div>

          <form class="mt-3 mb-5">

            <!-- Input -->
            <div class="mb-3 d-flex flex-column">
              <ion-label>Enter your Email / Number</ion-label>
              <ion-input type="text" placeholder="Enter your email address / number">
              </ion-input>
            </div>

            <ion-button expand="block" class="mt-4" [routerLink]="['/auth/sendOtp']">
              Send OTP
            </ion-button>

          </form>

        </div>
      </div>

    </div>

  </ion-col>
</ion-page>
