<ion-page>
  <ion-col [fullscreen]="true">

    <div class="container-fluid custom-scrollbar">
      <div class="row">

        <div class="mt-2 ms-2">
          <a [routerLink]="['/auth']">
            <img src="assets/icon/back_button.png" height="30px" />
          </a>
        </div>

        <div class="text-center">
          <img src="assets/icon/sign_upimage.webp" class="mt-3 mb-3" style="width: 350px; height: 250px;" />
        </div>

        <div class="ion-padding form_content">

          <div class="d-flex justify-content-center">
            <hr class="w-25" />
          </div>

          <div class="Header_informer text-center">
            <h2>REGISTER PAGE</h2>
            <p>Create your New Account :-)</p>
          </div>

          <form>

            <!-- Full Name -->
            <div class="mb-2 d-flex flex-column">
              <ion-label>Full Name</ion-label>
              <ion-input type="text" placeholder="Enter your Full Name"></ion-input>
            </div>

            <!-- Phone -->
            <div class="mb-2 d-flex flex-column">
              <ion-label>Phone No</ion-label>
              <ion-input type="tel" placeholder="Enter your Phone Number"></ion-input>
            </div>

            <!-- Company -->
            <div class="mb-2 d-flex flex-column">
              <ion-label>Your Company Name</ion-label>
              <ion-input type="text" placeholder="Enter your Company Name"></ion-input>
            </div>

            <!-- Password -->
            <div class="mb-2 d-flex flex-column position-relative">
              <ion-label>Password</ion-label>
              <div class="input-container">
                <ion-input [type]="passwordType" placeholder="Enter your password"></ion-input>

                <ion-icon [name]="passwordIcon" (click)="togglePasswordVisibility()" class="icon_eye">
                </ion-icon>
              </div>
            </div>

            <!-- Submit -->
            <ion-button expand="block" class="mt-3">
              Submit
            </ion-button>

            <!-- Login -->
            <p class="text-center mt-3">
              Already a member?
              <a [routerLink]="['/auth']">Login</a>
            </p>

            <!-- Social -->
            <div class="d-flex justify-content-between mt-3 px-3">
              <ion-button class="col-5">
                <i class="fa fa-google-plus me-1"></i> Google
              </ion-button>

              <ion-button class="col-5">
                <i class="fa fa-twitter me-1"></i> Twitter
              </ion-button>
            </div>

          </form>

        </div>
      </div>

    </div>

  </ion-col>
</ion-page>
