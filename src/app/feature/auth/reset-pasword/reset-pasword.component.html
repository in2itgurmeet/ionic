<ion-page>
  <ion-col [fullscreen]="true">

    <div class="container-fluid custom-scrollbar">
      <div class="row">
        <!-- Back Button -->
        <div class="mt-2 ms-2">
          <a routerLink="/auth/sendOtp">
            <img src="assets/icon/back_button.png" height="30px" />
          </a>
        </div>

        <!-- Image -->
        <div class="text-center">
          <img src="assets/icon/Login_svgImage.webp" class="mt-3 mb-3" style="width: 350px; height: 250px;" />
        </div>

        <!-- Form -->
        <div class="ion-padding form_content">

          <div class="d-flex justify-content-center">
            <hr class="w-25" />
          </div>

          <div class="Header_informer text-center">
            <h2>RESET PASSWORD</h2>
            <p>Create a new Password</p>
          </div>

          <form>

            <!-- Password -->
            <div class="mb-3 d-flex flex-column position-relative">
              <ion-label>Password</ion-label>

              <div class="input-container">
                <ion-input [type]="passwordType" placeholder="Enter your password">
                </ion-input>

                <ion-icon [name]="passwordIcon" (click)="togglePasswordVisibility()" class="icon_eye">
                </ion-icon>
              </div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3 d-flex flex-column position-relative">
              <ion-label>Confirm Password</ion-label>

              <div class="input-container">
                <ion-input [type]="passwordType" placeholder="Confirm your password">
                </ion-input>

                <ion-icon [name]="passwordIcon" (click)="togglePasswordVisibility()" class="icon_eye">
                </ion-icon>
              </div>
            </div>

            <!-- Submit -->
            <ion-button expand="block" class="mt-4" [routerLink]="['/auth']">
              Submit
            </ion-button>

          </form>

        </div>

      </div>

    </div>

  </ion-col>
</ion-page>
